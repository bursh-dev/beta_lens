<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Annotate Routes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111; color: #ccc; font-family: 'Courier New', monospace;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    -webkit-user-select: none; user-select: none;
  }
  h1 { font-size: 20px; margin: 14px 0 4px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
  .subtitle { font-size: 11px; color: #666; margin-bottom: 12px; }

  #load-screen { padding: 40px 20px; text-align: center; }
  #load-screen label {
    display: inline-block; margin-top: 24px; padding: 14px 36px;
    border: 2px solid #4caf50; border-radius: 12px; color: #4caf50;
    font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold;
    cursor: pointer; letter-spacing: 1px;
  }
  #load-screen label:active { transform: scale(0.96); }
  #file-input { display: none; }
  #or-load-existing { margin-top: 16px; }
  #or-load-existing button {
    background: none; border: 1px solid #666; border-radius: 8px;
    color: #888; font-family: 'Courier New', monospace; font-size: 12px;
    padding: 8px 20px; cursor: pointer;
  }

  #annotate-screen { display: none; width: 100%; max-width: 540px; padding: 8px; }
  .progress-bar { display: flex; gap: 4px; margin-bottom: 8px; justify-content: center; }
  .progress-dot {
    width: 10px; height: 10px; border-radius: 50%; background: #333; border: 1px solid #555; cursor: pointer;
  }
  .progress-dot.done { background: #4caf50; border-color: #4caf50; }
  .progress-dot.active { border-color: #fff; box-shadow: 0 0 4px #fff; }
  .progress-dot.partial { background: #ff9800; border-color: #ff9800; }

  #img-container {
    width: 100%; aspect-ratio: 1; background: #222; border-radius: 10px;
    overflow: hidden; border: 2px solid #333; position: relative;
  }
  #img-container img { width: 100%; height: 100%; object-fit: contain; }
  #line-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 3; touch-action: none;
  }
  #route-label {
    position: absolute; top: 8px; left: 8px; z-index: 4;
    background: rgba(0,0,0,0.7); border-radius: 6px; padding: 4px 10px;
    font-size: 12px; color: #aaa;
  }
  #sit-buttons {
    position: absolute; bottom: 10px; left: 8px; z-index: 4;
    display: flex; gap: 8px;
  }
  .sit-opt {
    padding: 10px 16px; border-radius: 10px; font-family: 'Courier New', monospace;
    font-size: 14px; font-weight: bold; cursor: pointer;
    border: 2px solid #777; color: #ccc;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
    transition: all 0.15s;
  }
  .sit-opt:active { transform: scale(0.96); }
  .sit-opt.selected-sit { border-color: #ff9800; color: #ff9800; background: rgba(255,152,0,0.25); }
  .sit-opt.selected-stand { border-color: #2196f3; color: #2196f3; background: rgba(33,150,243,0.2); }

  #grade-section { margin: 10px 0 6px; text-align: center; }
  #grade-section .section-label { font-size: 11px; color: #666; margin-bottom: 6px; }
  #grade-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(52px, 1fr)); gap: 6px; }
  .grade-btn {
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    border: 2px solid #444; border-radius: 8px;
    color: #ddd; font-family: 'Courier New', monospace;
    font-size: 15px; font-weight: bold; padding: 10px 0;
    cursor: pointer; transition: all 0.15s;
  }
  .grade-btn:active { transform: scale(0.96); }
  .grade-btn.selected { border-color: #ff8844; color: #ff8844; background: linear-gradient(135deg, #3a2a1a, #1f150d); }

  /* --- Move drawing --- */
  #moves-section { margin: 10px 0 6px; text-align: center; }
  #moves-section .section-label { font-size: 11px; color: #666; margin-bottom: 6px; }
  #move-buttons { display: flex; gap: 8px; justify-content: center; }
  .move-btn {
    flex: 1; padding: 10px 0; border-radius: 8px;
    font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold;
    cursor: pointer; border: 2px solid #444; color: #888;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    transition: all 0.15s; text-align: center;
  }
  .move-btn:active { transform: scale(0.96); }
  .move-btn.drawing { border-color: #fff; color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.3); }
  .move-btn.has-line { border-color: #4caf50; color: #4caf50; }
  .move-btn.crux-btn.has-line { border-color: #f44336; color: #f44336; }
  #draw-hint { font-size: 11px; color: #666; margin-top: 6px; height: 16px; }

  #nav-row { display: flex; gap: 10px; margin: 12px 0; justify-content: center; align-items: center; }
  .nav-btn {
    background: none; border: 1px solid #555; border-radius: 8px;
    color: #aaa; font-family: 'Courier New', monospace; font-size: 20px;
    width: 44px; height: 44px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-btn:active:not(:disabled) { background: #333; }
  #nav-label { font-size: 14px; color: #888; min-width: 80px; text-align: center; }
  #next-ready {
    background: linear-gradient(135deg, #1b3a1b, #0d1f0d);
    border: 2px solid #4caf50; border-radius: 10px;
    color: #4caf50; font-family: 'Courier New', monospace;
    font-size: 15px; font-weight: bold; padding: 10px 32px;
    cursor: pointer; letter-spacing: 1px; display: none;
  }
  #next-ready:active { transform: scale(0.96); }

  #save-btn {
    background: linear-gradient(135deg, #1b3a1b, #0d1f0d);
    border: 2px solid #4caf50; border-radius: 10px;
    color: #4caf50; font-family: 'Courier New', monospace;
    font-size: 15px; font-weight: bold; padding: 12px 36px;
    cursor: pointer; margin: 10px 0 20px; letter-spacing: 1px;
  }
  #save-btn:active { transform: scale(0.96); }
  #status-msg { font-size: 12px; color: #4caf50; height: 20px; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="load-screen">
  <h1>ANNOTATE ROUTES</h1>
  <div class="subtitle">Grade, sit start & crux move for each route</div>
  <label>
    LOAD IMAGES
    <input type="file" id="file-input" accept="image/*" multiple>
  </label>
  <div id="or-load-existing">
    <div style="color:#555; font-size:11px; margin:12px 0 8px;">or load existing</div>
    <button onclick="loadExistingJson()">LOAD routes.json</button>
    <input type="file" id="json-input" accept=".json" style="display:none">
  </div>
</div>

<div id="annotate-screen">
  <div class="progress-bar" id="progress-bar"></div>

  <div id="img-container">
    <img id="route-img">
    <canvas id="line-canvas"></canvas>
    <div id="route-label"></div>
    <div id="sit-buttons">
      <button class="sit-opt" onclick="selectSit(true)">SIT START</button>
      <button class="sit-opt" onclick="selectSit(false)">STANDING</button>
    </div>
  </div>

  <div id="grade-section">
    <div class="section-label">GRADE</div>
    <div id="grade-buttons"></div>
  </div>

  <div id="moves-section">
    <div class="section-label">MOVES — tap two points on the image to draw each line</div>
    <div id="move-buttons">
      <button class="move-btn crux-btn" onclick="startDrawing(0)">CRUX</button>
      <button class="move-btn" onclick="startDrawing(1)">FAKE 1</button>
      <button class="move-btn" onclick="startDrawing(2)">FAKE 2</button>
    </div>
    <div id="draw-hint"></div>
  </div>

  <div id="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&larr;</button>
    <div id="nav-label"></div>
    <button id="next-ready" onclick="navigateNext()">NEXT &rarr;</button>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">&rarr;</button>
  </div>

  <div id="status-msg"></div>
  <div style="text-align:center;">
    <button id="save-btn" onclick="saveJson()">DOWNLOAD routes.json</button>
  </div>
</div>

<script>
const ALL_GRADES = [];
for (let i = 0; i <= 16; i++) ALL_GRADES.push('V' + i);

const MOVE_COLORS = ['#f44336', '#888', '#888']; // crux=red, fakes=gray
const MOVE_LABELS = ['CRUX', 'FAKE 1', 'FAKE 2'];

let routes = []; // { file, name, dataUrl, grade, sit, moves:[{x1,y1,x2,y2}x3], crux:0 }
let currentIdx = 0;
let drawingMove = -1; // which move index we're drawing (-1=none)
let drawFirstPoint = null; // {x, y} in 0-1 coords

// --- File loading ---
document.getElementById('file-input').addEventListener('change', function(e) {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  files.sort((a, b) => a.name.localeCompare(b.name));
  routes = files.map(f => ({
    file: f, name: f.name, dataUrl: null, grade: null, sit: null,
    moves: [null, null, null], crux: 0
  }));
  loadImages(0);
});

document.getElementById('json-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function() {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error('not an array');
      routes = data.map(r => ({
        file: null, name: r.img, dataUrl: null,
        grade: r.grade || null,
        sit: typeof r.sit === 'boolean' ? r.sit : null,
        moves: r.moves ? r.moves.map(m => m ? Object.assign({}, m) : null) : [null, null, null],
        crux: r.crux || 0
      }));
      // Pad moves to 3
      routes.forEach(r => { while (r.moves.length < 3) r.moves.push(null); });
      alert('Now select the image files that match routes.json');
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
      inp.onchange = function() {
        const files = Array.from(inp.files);
        const byName = {};
        files.forEach(f => byName[f.name] = f);
        routes.forEach(r => { if (byName[r.name]) r.file = byName[r.name]; });
        routes = routes.filter(r => r.file);
        if (!routes.length) { alert('No matching images found'); return; }
        loadImages(0);
      };
      inp.click();
    } catch (err) {
      alert('Invalid routes.json: ' + err.message);
    }
  };
  reader.readAsText(file);
});

function loadExistingJson() { document.getElementById('json-input').click(); }

function loadImages(startIdx) {
  let loaded = 0;
  routes.forEach(r => {
    const reader = new FileReader();
    reader.onload = function() {
      r.dataUrl = reader.result;
      loaded++;
      if (loaded === routes.length) { currentIdx = startIdx; showAnnotateScreen(); }
    };
    reader.readAsDataURL(r.file);
  });
}

// --- Annotate UI ---
function showAnnotateScreen() {
  document.getElementById('load-screen').style.display = 'none';
  document.getElementById('annotate-screen').style.display = 'block';
  buildGradeButtons();
  buildProgressBar();
  resizeCanvas();
  showRoute();
}

function buildGradeButtons() {
  const container = document.getElementById('grade-buttons');
  container.innerHTML = '';
  ALL_GRADES.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'grade-btn';
    btn.textContent = g;
    btn.onclick = function() { selectGrade(g); };
    container.appendChild(btn);
  });
}

function buildProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  routes.forEach((r, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    dot.onclick = function() { currentIdx = i; showRoute(); };
    bar.appendChild(dot);
  });
}

function isComplete(r) {
  return r.grade !== null && r.sit !== null && r.moves[0] && r.moves[1] && r.moves[2];
}

function updateProgressBar() {
  const dots = document.querySelectorAll('.progress-dot');
  dots.forEach((dot, i) => {
    dot.className = 'progress-dot';
    if (i === currentIdx) dot.classList.add('active');
    const r = routes[i];
    if (isComplete(r)) dot.classList.add('done');
    else if (r.grade !== null || r.sit !== null || r.moves.some(m => m)) dot.classList.add('partial');
  });
}

function updateNextButton() {
  const r = routes[currentIdx];
  const ready = isComplete(r) && currentIdx < routes.length - 1;
  document.getElementById('next-ready').style.display = ready ? 'inline-block' : 'none';
  document.getElementById('next-btn').style.display = ready ? 'none' : 'inline-flex';
}

function updateMoveButtons() {
  const r = routes[currentIdx];
  const btns = document.querySelectorAll('.move-btn');
  btns.forEach((btn, i) => {
    btn.className = 'move-btn' + (i === 0 ? ' crux-btn' : '');
    if (i === drawingMove) btn.classList.add('drawing');
    if (r.moves[i]) btn.classList.add('has-line');
  });
}

function showRoute() {
  const r = routes[currentIdx];
  document.getElementById('route-img').src = r.dataUrl;
  document.getElementById('route-label').textContent = (currentIdx + 1) + ' / ' + routes.length + '  ' + r.name;
  document.getElementById('nav-label').textContent = (currentIdx + 1) + ' / ' + routes.length;
  document.getElementById('prev-btn').disabled = currentIdx === 0;
  document.getElementById('next-btn').disabled = currentIdx === routes.length - 1;

  document.querySelectorAll('.grade-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.textContent === r.grade);
  });

  const sitBtns = document.querySelectorAll('.sit-opt');
  sitBtns[0].className = 'sit-opt' + (r.sit === true ? ' selected-sit' : '');
  sitBtns[1].className = 'sit-opt' + (r.sit === false ? ' selected-stand' : '');

  drawingMove = -1;
  drawFirstPoint = null;
  document.getElementById('draw-hint').textContent = '';
  updateMoveButtons();
  drawLines();
  updateProgressBar();
  updateNextButton();
  document.getElementById('status-msg').textContent = '';
}

function selectGrade(g) {
  routes[currentIdx].grade = g;
  document.querySelectorAll('.grade-btn').forEach(btn => btn.classList.toggle('selected', btn.textContent === g));
  updateProgressBar();
  updateNextButton();
}

function selectSit(isSit) {
  routes[currentIdx].sit = isSit;
  const sitBtns = document.querySelectorAll('.sit-opt');
  sitBtns[0].className = 'sit-opt' + (isSit ? ' selected-sit' : '');
  sitBtns[1].className = 'sit-opt' + (!isSit ? ' selected-stand' : '');
  updateProgressBar();
  updateNextButton();
}

function navigateNext() {
  if (currentIdx < routes.length - 1) { currentIdx++; showRoute(); }
}

function navigate(dir) {
  currentIdx = Math.max(0, Math.min(routes.length - 1, currentIdx + dir));
  showRoute();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'Escape') { drawingMove = -1; drawFirstPoint = null; updateMoveButtons(); document.getElementById('draw-hint').textContent = ''; }
});

// --- Canvas drawing ---
function resizeCanvas() {
  const cont = document.getElementById('img-container');
  const canvas = document.getElementById('line-canvas');
  canvas.width = cont.clientWidth;
  canvas.height = cont.clientHeight;
}
window.addEventListener('resize', function() { resizeCanvas(); drawLines(); });

function getImgBounds() {
  const cont = document.getElementById('img-container');
  const img = document.getElementById('route-img');
  const cw = cont.clientWidth, ch = cont.clientHeight;
  const nw = img.naturalWidth, nh = img.naturalHeight;
  if (!nw || !nh) return { x: 0, y: 0, w: cw, h: ch };
  const scale = Math.min(cw / nw, ch / nh);
  const w = nw * scale, h = nh * scale;
  return { x: (cw - w) / 2, y: (ch - h) / 2, w, h };
}

function drawLines() {
  const canvas = document.getElementById('line-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bounds = getImgBounds();
  const r = routes[currentIdx];

  r.moves.forEach((m, i) => {
    if (!m) return;
    const x1 = bounds.x + m.x1 * bounds.w;
    const y1 = bounds.y + m.y1 * bounds.h;
    const x2 = bounds.x + m.x2 * bounds.w;
    const y2 = bounds.y + m.y2 * bounds.h;

    const color = MOVE_COLORS[i];

    // Draw line
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    // Draw endpoints
    [x1, y1, x2, y2].forEach((_, idx) => {
      if (idx % 2 !== 0) return;
      const px = [x1, x2][idx / 2], py = [y1, y2][idx / 2];
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    // Label at midpoint
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    const label = MOVE_LABELS[i];
    const tw = ctx.measureText(label).width;
    ctx.fillRect(mx - tw / 2 - 4, my - 8, tw + 8, 16);
    ctx.fillStyle = color;
    ctx.fillText(label, mx, my);
  });

  // Draw pending first point
  if (drawFirstPoint) {
    const px = bounds.x + drawFirstPoint.x * bounds.w;
    const py = bounds.y + drawFirstPoint.y * bounds.h;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px, py, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = MOVE_COLORS[drawingMove] || '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function startDrawing(moveIdx) {
  if (drawingMove === moveIdx) {
    // Cancel
    drawingMove = -1;
    drawFirstPoint = null;
    document.getElementById('draw-hint').textContent = '';
  } else {
    drawingMove = moveIdx;
    drawFirstPoint = null;
    document.getElementById('draw-hint').textContent = 'Tap the FIRST hold';
  }
  updateMoveButtons();
  drawLines();
}

document.getElementById('line-canvas').addEventListener('click', function(e) {
  if (drawingMove < 0) return;
  const canvas = document.getElementById('line-canvas');
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const bounds = getImgBounds();

  // Convert to 0-1 relative to image
  const px = (cx - bounds.x) / bounds.w;
  const py = (cy - bounds.y) / bounds.h;
  if (px < 0 || px > 1 || py < 0 || py > 1) return; // outside image

  if (!drawFirstPoint) {
    drawFirstPoint = { x: px, y: py };
    document.getElementById('draw-hint').textContent = 'Tap the SECOND hold';
    drawLines();
  } else {
    routes[currentIdx].moves[drawingMove] = {
      x1: drawFirstPoint.x, y1: drawFirstPoint.y,
      x2: px, y2: py
    };
    drawFirstPoint = null;
    const wasDrawing = drawingMove;
    drawingMove = -1;
    document.getElementById('draw-hint').textContent = '';

    // Auto-advance to next empty move slot
    const r = routes[currentIdx];
    for (let i = 0; i < 3; i++) {
      const next = (wasDrawing + 1 + i) % 3;
      if (!r.moves[next]) { startDrawing(next); break; }
    }

    updateMoveButtons();
    drawLines();
    updateProgressBar();
    updateNextButton();
  }
});

// Touch support for canvas
document.getElementById('line-canvas').addEventListener('touchend', function(e) {
  if (drawingMove < 0) return;
  e.preventDefault();
  const touch = e.changedTouches[0];
  const canvas = document.getElementById('line-canvas');
  const rect = canvas.getBoundingClientRect();
  const cx = touch.clientX - rect.left, cy = touch.clientY - rect.top;
  const bounds = getImgBounds();

  const px = (cx - bounds.x) / bounds.w;
  const py = (cy - bounds.y) / bounds.h;
  if (px < 0 || px > 1 || py < 0 || py > 1) return;

  if (!drawFirstPoint) {
    drawFirstPoint = { x: px, y: py };
    document.getElementById('draw-hint').textContent = 'Tap the SECOND hold';
    drawLines();
  } else {
    routes[currentIdx].moves[drawingMove] = {
      x1: drawFirstPoint.x, y1: drawFirstPoint.y,
      x2: px, y2: py
    };
    drawFirstPoint = null;
    const wasDrawing = drawingMove;
    drawingMove = -1;
    document.getElementById('draw-hint').textContent = '';

    const r = routes[currentIdx];
    for (let i = 0; i < 3; i++) {
      const next = (wasDrawing + 1 + i) % 3;
      if (!r.moves[next]) { startDrawing(next); break; }
    }

    updateMoveButtons();
    drawLines();
    updateProgressBar();
    updateNextButton();
  }
});

// Redraw when image loads
document.getElementById('route-img').addEventListener('load', function() {
  resizeCanvas();
  drawLines();
});

// --- Save ---
function saveJson() {
  const incomplete = routes.filter(r => !isComplete(r));
  if (incomplete.length) {
    const r = incomplete[0];
    let missing = [];
    if (r.grade === null) missing.push('grade');
    if (r.sit === null) missing.push('sit start');
    if (!r.moves[0] || !r.moves[1] || !r.moves[2]) missing.push('moves');
    document.getElementById('status-msg').textContent = incomplete.length + ' route(s) incomplete — missing: ' + missing.join(', ');
    document.getElementById('status-msg').style.color = '#f44336';
    currentIdx = routes.indexOf(incomplete[0]);
    showRoute();
    return;
  }

  const data = routes.map(r => ({
    img: r.name,
    grade: r.grade,
    sit: r.sit,
    moves: r.moves.map(m => ({ x1: +m.x1.toFixed(4), y1: +m.y1.toFixed(4), x2: +m.x2.toFixed(4), y2: +m.y2.toFixed(4) })),
    crux: 0
  }));

  const blob = new Blob([JSON.stringify(data, null, 2) + '\n'], { type: 'application/json' });
  const link = document.createElement('a');
  link.download = 'routes.json';
  link.href = URL.createObjectURL(blob);
  link.click();

  document.getElementById('status-msg').textContent = 'Saved! Drop routes.json into docs/game/';
  document.getElementById('status-msg').style.color = '#4caf50';
}
</script>
</body>
</html>
